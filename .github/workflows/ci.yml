name: ci-test
run-name: ${{ github.actor }} 正在测试 GitHub Actions 🚀
# 触发条件：推送代码到master分支
on:
  push:
    branches:
      - master

# 任务：目前只有构建一个任务
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - run: echo "☝🏻🤓 触发事件 ${{ github.event_name }} ."
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 列出仓库的文件
        run: |
          ls ${{ github.workspace }}
      - run: echo "😋😋查看任务状态 ${{ job.status }}."
      # 新增：设置 Node.js 环境
      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 下载依赖
        run: pnpm install

      - name: 开始构建
        run: pnpm build
      - run: echo "🥰🥰构建完成."
